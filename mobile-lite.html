<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b24">
  <title>Daymori Lite</title>
  <style>
    :root{
      --bg:#081018;
      --bg2:#0f1d2a;
      --card:#132433cc;
      --line:#86d8b766;
      --text:#eaf7ff;
      --muted:#d2e4f2;
      --accent:#9ff3a5;
      --accent2:#7fd8ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:
        radial-gradient(140% 70% at 20% -10%,#1a3f2e66,transparent 55%),
        radial-gradient(120% 80% at 100% 100%,#235f8966,transparent 58%),
        linear-gradient(160deg,var(--bg),var(--bg2));
      display:flex;
      justify-content:center;
      padding:16px;
    }
    .app{
      width:min(100%,680px);
      display:grid;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      backdrop-filter:blur(8px);
      box-shadow:0 14px 36px #00000066;
    }
    .hero{padding:16px}
    .hero h1{margin:0;font-size:1.2rem}
    .hero p{margin:8px 0 0;color:var(--muted);line-height:1.5}
    .tasks{padding:12px}
    .stack{
      position:relative;
      min-height:290px;
      overflow:hidden;
    }
    .item{
      position:absolute;
      width:min(72vw,300px);
      max-width:300px;
      background:#172a38d4;
      border:1px solid #8ad9ba59;
      border-radius:14px;
      padding:10px 12px;
      box-shadow:0 18px 40px #00000080;
      transition:all .35s ease;
    }
    .item h3{margin:0 0 4px;font-size:1rem}
    .item p{margin:0;color:var(--muted);font-size:.92rem;line-height:1.45}
    .i1{left:8%;top:18%;transform:rotate(-8deg)}
    .i2{right:10%;top:12%;transform:rotate(7deg)}
    .i3{left:50%;top:48%;transform:translate(-50%,-50%);z-index:3;width:min(78vw,340px)}
    .i4{left:18%;bottom:10%;transform:rotate(7deg)}
    .i5{right:14%;bottom:12%;transform:rotate(-7deg)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    button{
      border:0;
      border-radius:10px;
      min-height:38px;
      padding:8px 12px;
      color:#072114;
      font-weight:700;
      background:linear-gradient(120deg,var(--accent),var(--accent2));
    }
    .mini{padding:12px;color:var(--muted);font-size:.9rem}
    @media (max-width:760px){
      .item{width:min(80vw,300px)}
      .i3{width:min(88vw,340px)}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card hero">
      <h1>Daymori Lite</h1>
      <p>手机极速版。点击卡片即可编辑事项，数据保存在本机浏览器。</p>
    </section>

    <section class="card tasks">
      <div class="stack" id="stack"></div>
      <div class="toolbar">
        <button id="resetBtn" type="button">清空事项</button>
      </div>
    </section>

    <section class="card mini">提示：这个页面是为手机网络适配的新站点，结构更轻，打开更快。</section>
  </main>

  <script>
    const KEY='daymori-lite-5-items';
    const defaults=['事项 1','事项 2','事项 3','事项 4','事项 5'];
    const classes=['i1','i2','i3','i4','i5'];

    function load(){
      try{
        const v=JSON.parse(localStorage.getItem(KEY)||'[]');
        if(Array.isArray(v)&&v.length===5)return v.map(x=>String(x||''));
      }catch{}
      return [...defaults];
    }

    function save(items){
      localStorage.setItem(KEY,JSON.stringify(items));
    }

    function render(){
      const root=document.getElementById('stack');
      const items=load();
      root.innerHTML='';
      items.forEach((text,i)=>{
        const el=document.createElement('article');
        el.className='item '+classes[i];
        el.innerHTML='<h3>事项 '+(i+1)+'</h3><p>'+(text||('未填写第 '+(i+1)+' 项'))+'</p>';
        el.addEventListener('click',()=>{
          const next=prompt('编辑事项 '+(i+1),items[i]||'');
          if(next===null)return;
          items[i]=next.trim();
          save(items);
          render();
        });
        root.appendChild(el);
      });
    }

    document.getElementById('resetBtn').addEventListener('click',()=>{
      save(['','','','','']);
      render();
    });

    render();
  </script>
</body>
</html>
